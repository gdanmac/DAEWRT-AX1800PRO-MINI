name: 下载 v2ray 规则文件到仓库
on:
  workflow_dispatch:  # 手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 创建目录并下载文件
        run: |
          # 创建你要的目录结构（会保存在仓库里）
          mkdir -p usr/share/v2ray
          
          # 下载 geoip.dat
          wget -P usr/share/v2ray https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          
          # 下载 geosite.dat
          wget -P usr/share/v2ray https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          
          echo "✅ 文件下载完成"
          ls -lh usr/share/v2ray/

      - name: 提交并推送到 GitHub 仓库
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "📦 自动更新 v2ray geoip & geosite 规则"
          git push
